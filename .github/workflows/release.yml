name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: sh tests/test_runner.sh

      - name: Build single-file
        run: sh build.sh dist/install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.sh
          generate_release_notes: true
