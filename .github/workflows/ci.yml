name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on lib/
        run: shellcheck lib/*.sh
      - name: Run ShellCheck on install.sh
        run: shellcheck install.sh
      - name: Run ShellCheck on build.sh
        run: shellcheck build.sh

  test-ubuntu:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: sh tests/test_runner.sh

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: sh tests/test_runner.sh

  build:
    name: Build single-file
    runs-on: ubuntu-latest
    needs: [shellcheck, test-ubuntu]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: sh build.sh dist/install.sh
      - name: Verify built file syntax
        run: sh -n dist/install.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: install.sh
          path: dist/install.sh
